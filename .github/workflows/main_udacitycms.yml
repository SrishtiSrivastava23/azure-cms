

name: Build and Deploy Udacity CMS to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Step 1: Checkout your repo
      - uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Install dependencies in a virtual environment
      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Package app for deployment (excluding venv)
      - name: Package app
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !venv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      # Step 1: Download artifact from build
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      # Step 2: Login to Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7FFBCD173FC14FE19B11FB8FF96DB8A0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F507957CCE9943AF930BD15B72B39ED1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_386AEEF840E848DE8C6CE726341D7FE1 }}

      # Step 3: Deploy to your Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'udacitycms'       # <-- Change if your App Service name is different
          slot-name: 'Production'
          
